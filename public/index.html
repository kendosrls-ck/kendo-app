<!DOCTYPE html>
<html lang="it" translate="no">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080808" />
    <meta name="google" content="notranslate" />
    <meta http-equiv="Content-Language" content="it" />
    <meta
      name="description"
      content="Kendo - Gestione fitness EMS e Vacufit a Padova"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- PWA iOS: installabile come app nativa con icona homescreen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Kendo" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="%PUBLIC_URL%/logo512.png" />
    <!-- Open Graph / preview link -->
    <meta property="og:title" content="Kendo · Fit And Go Padova" />
    <meta property="og:description" content="La tua palestra digitale: prenota sedute, vedi i tuoi progressi, gestisci il tuo abbonamento." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
    <meta property="og:locale" content="it_IT" />
    <title>Kendo - Fit And Go Padova</title>
    <style>
      html, body { background:#080808 !important; color:#F5F5F5; margin:0; padding:0; }
      #root { background:#080808; min-height:100vh; }
      #kendo-pre-loader { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#080808; z-index:9999; }
      #kendo-pre-loader .ring { width:36px; height:36px; border:3px solid #1e1e1e; border-top-color:#D4A843; border-radius:50%; animation:spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body class="notranslate">
    <noscript>Per usare Kendo devi abilitare JavaScript nel tuo browser.</noscript>
    <div id="root"><div id="kendo-pre-loader"><div class="ring"></div></div></div>
    <script>
      // Service Worker registration: necessario per installazione PWA su Android
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/service-worker.js')
            .catch(function (e) { console.log('SW registration failed:', e); });
        });
      }
    </script>
  </body>
</html>
